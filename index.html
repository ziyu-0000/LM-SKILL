<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>联盟开发者运营工作流 · Skill Hub</title>
<link rel="stylesheet" href="./output.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  
  * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
  
  body {
    background: linear-gradient(135deg, #0a0f1c 0%, #111827 50%, #0d1525 100%);
    min-height: 100vh;
    color: #e2e8f0;
  }

  .glass {
    background: rgba(255,255,255,0.04);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .glass-card {
    background: rgba(255,255,255,0.03);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.06);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .glass-card:hover {
    background: rgba(255,255,255,0.06);
    border-color: rgba(99,102,241,0.3);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(99,102,241,0.15);
  }

  .phase-tab {
    position: relative;
    cursor: pointer;
    transition: all 0.3s ease;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 500;
    color: #94a3b8;
    white-space: nowrap;
  }

  .phase-tab.active {
    background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(139,92,246,0.1));
    color: #fff;
    border: 1px solid rgba(99,102,241,0.3);
  }

  .phase-tab:hover:not(.active) {
    background: rgba(255,255,255,0.05);
    color: #cbd5e1;
  }

  .phase-tab.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 50%;
    transform: translateX(-50%);
    width: 30px;
    height: 3px;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    border-radius: 3px;
  }

  .work-item {
    position: relative;
    overflow: hidden;
  }

  .work-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    border-radius: 4px 0 0 4px;
    transition: all 0.3s ease;
  }

  .work-item:hover::before {
    width: 5px;
  }

  .tag-pill {
    display: inline-flex;
    align-items: center;
    padding: 2px 10px;
    border-radius: 9999px;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
  }

  /* 阶段颜色 */
  .phase-market::before { background: linear-gradient(to bottom, #3b82f6, #60a5fa); }
  .phase-traffic::before { background: linear-gradient(to bottom, #10b981, #34d399); }
  .phase-form::before { background: linear-gradient(to bottom, #f59e0b, #fbbf24); }
  .phase-monetize::before { background: linear-gradient(to bottom, #ef4444, #f87171); }
  .phase-exp::before { background: linear-gradient(to bottom, #8b5cf6, #a78bfa); }
  .phase-service::before { background: linear-gradient(to bottom, #ec4899, #f472b6); }

  /* 业务类型标签色 */
  .tag-general { background: rgba(99,102,241,0.15); color: #a5b4fc; border: 1px solid rgba(99,102,241,0.25); }
  .tag-sdk { background: rgba(16,185,129,0.15); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.25); }
  .tag-api { background: rgba(245,158,11,0.15); color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
  
  /* 工作类型标签 */
  .type-info { background: rgba(56,189,248,0.12); color: #7dd3fc; border: 1px solid rgba(56,189,248,0.2); }
  .type-comm { background: rgba(167,139,250,0.12); color: #c4b5fd; border: 1px solid rgba(167,139,250,0.2); }
  .type-plan { background: rgba(244,114,182,0.12); color: #f9a8d4; border: 1px solid rgba(244,114,182,0.2); }
  .type-demand { background: rgba(52,211,153,0.12); color: #86efac; border: 1px solid rgba(52,211,153,0.2); }
  .type-config { background: rgba(251,191,36,0.12); color: #fde047; border: 1px solid rgba(251,191,36,0.25); }
  .type-data { background: rgba(236,72,153,0.12); color: #f9a8d4; border: 1px solid rgba(236,72,153,0.2); }
  .type-decision { background: rgba(139,92,246,0.12); color: #ddd6fe; border: 1px solid rgba(139,92,246,0.2); }

  /* Skill 上传区域 */
  .skill-upload-zone {
    border: 1.5px dashed rgba(99,102,241,0.3);
    border-radius: 10px;
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .skill-upload-zone:hover, .skill-upload-zone.dragover {
    border-color: rgba(99,102,241,0.7);
    background: rgba(99,102,241,0.05);
  }

  /* Modal 样式 */
  .modal-overlay {
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
  }

  /* 统计数字动画 */
  .stat-number {
    font-size: 32px;
    font-weight: 800;
    background: linear-gradient(135deg, #6366f1, #8b5cf6, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* 进度条 */
  .progress-bar {
    height: 6px;
    border-radius: 3px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 3px;
    background: linear-gradient(90deg, #6366f1, #8b5cf6);
    transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* 滚动条美化 */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.3); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.5); }

  /* 技能卡片徽章 */
  .skill-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    background: linear-gradient(135deg, rgba(16,185,129,0.2), rgba(52,211,153,0.1));
    color: #6ee7b7;
    border: 1px solid rgba(16,185,129,0.3);
  }

  .no-skill-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    background: rgba(148,163,184,0.1);
    color: #64748b;
    border: 1px solid rgba(148,163,184,0.2);
  }

  /* 流程连接线动画 */
  .flow-line {
    position: relative;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .flow-line::before {
    content: '';
    position: absolute;
    width: 2px;
    height: 100%;
    background: linear-gradient(to bottom, transparent, rgba(99,102,241,0.4), transparent);
  }

  .flow-line::after {
    content: '▼';
    font-size: 10px;
    color: rgba(99,102,241,0.5);
  }

  /* 搜索框样式 */
  .search-input:focus {
    outline: none;
    border-color: rgba(99,102,241,0.5);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.1);
  }

  /* 动画 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .animate-in {
    animation: fadeInUp 0.4s ease-out forwards;
  }

  .stagger-1 { animation-delay: 0.05s; opacity: 0; }
  .stagger-2 { animation-delay: 0.1s; opacity: 0; }
  .stagger-3 { animation-delay: 0.15s; opacity: 0; }
  .stagger-4 { animation-delay: 0.2s; opacity: 0; }
  .stagger-5 { animation-delay: 0.25s; opacity: 0; }

  /* 已上传 skill 文件项 */
  .uploaded-skill-item {
    transition: all 0.2s ease;
  }

  .uploaded-skill-item:hover {
    background: rgba(255,255,255,0.04);
  }

  /* 粒子背景 */
  #particles {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .particle {
    position: absolute;
    width: 2px;
    height: 2px;
    background: rgba(99,102,241,0.3);
    border-radius: 50%;
    animation: float linear infinite;
  }

  @keyframes float {
    0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10% { opacity: 1; }
    90% { opacity: 1; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
  }

  /* 面包屑导航 */
  .breadcrumb-item + .breadcrumb-item::before {
    content: '/';
    margin: 0 8px;
    color: #475569;
  }

  /* ===== 新增：下载按钮样式 ===== */
  .btn-download {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 500;
    background: rgba(16,185,129,0.1);
    color: #6ee7b7;
    border: 1px solid rgba(16,185,129,0.2);
    cursor: pointer;
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .btn-download:hover {
    background: rgba(16,185,129,0.2);
    border-color: rgba(16,185,129,0.4);
    color: #a7f3d0;
  }

  /* 排行榜样式 */
  .rank-badge {
    width: 20px; height: 20px;
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0;
  }
  .rank-1 { background: linear-gradient(135deg,#f59e0b,#fbbf24); color:#1a1a1a; }
  .rank-2 { background: linear-gradient(135deg,#9ca3af,#d1d5db); color:#1a1a1a; }
  .rank-3 { background: linear-gradient(135deg,#cd7c32,#e5a04a); color:#1a1a1a; }
  .rank-n { background: rgba(255,255,255,0.06); color:#64748b; }

  .rank-bar {
    height: 6px; border-radius: 3px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
  }
  .rank-bar-fill {
    height: 100%; border-radius: 3px;
    transition: width 0.8s cubic-bezier(.22,1,.36,1);
  }

  .contributor-avatar {
    width: 28px; height: 28px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 700;
    flex-shrink: 0;
  }
</style>
</head>
<body class="antialiased">

<!-- 粒子背景 -->
<div id="particles"></div>

<!-- 主容器 -->
<div class="relative z-10 max-w-[1600px] mx-auto px-4 py-6">

  <!-- ===== 顶部 Header ===== -->
  <header class="mb-8">
    <div class="flex items-center justify-between mb-6">
      <div class="flex items-center gap-4">
        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center shadow-lg shadow-indigo-500/20">
          <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
          </svg>
        </div>
        <div>
          <h1 class="text-2xl font-bold text-white tracking-tight">联盟开发者运营工作流</h1>
          <p class="text-sm text-slate-400 mt-0.5">Skill Hub · 运营工作自动化平台</p>
        </div>
      </div>
      
      <div class="flex items-center gap-3">
        <!-- 全局搜索 -->
        <div class="relative">
          <input type="text" id="globalSearch" placeholder="搜索工作内容..." 
            class="search-input w-64 bg-white/[0.04] border border-white/10 rounded-lg px-4 py-2 pl-10 text-sm text-white placeholder-slate-500 focus:border-indigo-500/50">
          <svg class="w-4 h-4 text-slate-500 absolute left-3 top-1/2 -translate-y-1/2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
          </svg>
        </div>

        <!-- 全局上传按钮 -->
        <button onclick="openGlobalUploadModal()" class="flex items-center gap-2 bg-gradient-to-r from-indigo-500 to-purple-600 hover:from-indigo-600 hover:to-purple-700 text-white px-5 py-2 rounded-lg text-sm font-medium shadow-lg shadow-indigo-500/20 transition-all hover:shadow-indigo-500/30 active:scale-[0.97]">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
          上传 Skill
        </button>
      </div>
    </div>

    <!-- 统计面板 -->
    <div class="grid grid-cols-2 md:grid-cols-5 gap-4">
      <div class="glass rounded-xl p-4">
        <div class="stat-number" id="totalWorks">44</div>
        <div class="text-xs text-slate-400 mt-1">工作项总数</div>
      </div>
      <div class="glass rounded-xl p-4">
        <div class="stat-number">6</div>
        <div class="text-xs text-slate-400 mt-1">运营阶段</div>
      </div>
      <div class="glass rounded-xl p-4">
        <div class="stat-number" id="skillCount">0</div>
        <div class="text-xs text-slate-400 mt-1">已建设 Skill</div>
      </div>
      <div class="glass rounded-xl p-4">
        <div class="stat-number" id="coverageRate">0%</div>
        <div class="text-xs text-slate-400 mt-1">覆盖率</div>
        <div class="progress-bar mt-2"><div class="progress-fill" id="coverageBar" style="width:0%"></div></div>
      </div>
      <div class="glass rounded-xl p-4">
        <div class="stat-number" id="businessTypesCount">3</div>
        <div class="text-xs text-slate-400 mt-1">业务类型</div>
      </div>
    </div>
  </header>

  <!-- ===== 阶段 Tab 导航 ===== -->
  <nav class="mb-6 flex items-center gap-2 overflow-x-auto pb-2" id="phaseTabs">
    <!-- 由 JS 动态渲染 -->
  </nav>

  <!-- ===== 主内容区 ===== -->
  <main class="grid grid-cols-1 lg:grid-cols-3 gap-6">
    
    <!-- 左侧：工作流列表 (占 2 列) -->
    <div class="lg:col-span-2 space-y-4">
      
      <!-- 当前阶段标题 & 工作子类分组 -->
      <div id="worksContainer">
        <!-- 由 JS 动态渲染 -->
      </div>

    </div>

    <!-- 右侧：信息面板 -->
    <aside class="space-y-4">
      
      <!-- ===== Skill 调用量排行榜（置顶） ===== -->
      <div class="glass rounded-xl p-5">
        <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
          <svg class="w-4 h-4 text-orange-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
          调用量 Top 榜
        </h3>
        <div id="callRankingList" class="space-y-2"></div>
      </div>

      <!-- ===== 贡献者排行榜（置顶） ===== -->
      <div class="glass rounded-xl p-5">
        <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
          <svg class="w-4 h-4 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
          贡献者排行
        </h3>
        <div id="contributorRankingList" class="space-y-2"></div>
      </div>

      <!-- 已上传 Skills -->
      <div class="glass rounded-xl p-5">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-sm font-semibold text-white flex items-center gap-2">
            <svg class="w-4 h-4 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
            已上传 Skills
          </h3>
          <span class="text-xs text-slate-500" id="skillListCount">0 个文件</span>
        </div>
        <div id="uploadedSkillsList" class="space-y-2 max-h-[360px] overflow-y-auto pr-1">
          <div class="text-center py-6 text-slate-500 text-sm">
            <svg class="w-10 h-10 mx-auto mb-2 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/></svg>
            还没有上传的 Skill<br>点击「上传 Skill」开始
          </div>
        </div>
      </div>

      <!-- 筛选器 -->
      <div class="glass rounded-xl p-5">
        <h3 class="text-sm font-semibold text-white mb-4 flex items-center gap-2">
          <svg class="w-4 h-4 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z"/></svg>
          筛选器
        </h3>
        
        <div class="space-y-3">
          <!-- 仅看有 Skill -->
          <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" id="filterHasSkill" onchange="applyFilters()" class="w-4 h-4 rounded border-slate-600 bg-transparent text-indigo-500 focus:ring-indigo-500/30">
            <span class="text-sm text-slate-300 group-hover:text-white transition-colors">仅看已建设 Skill</span>
          </label>
          
          <!-- 仅看无 Skill -->
          <label class="flex items-center gap-2 cursor-pointer group">
            <input type="checkbox" id="filterNoSkill" onchange="applyFilters()" class="w-4 h-4 rounded border-slate-600 bg-transparent text-indigo-500 focus:ring-indigo-500/30">
            <span class="text-sm text-slate-300 group-hover:text-white transition-colors">仅看未建设（待补齐）</span>
          </label>

          <!-- 业务类型筛选 -->
          <div>
            <div class="text-xs text-slate-500 mb-2">业务类型</div>
            <div class="flex flex-wrap gap-2" id="businessTypeFilters">
              <!-- JS 渲染 -->
            </div>
          </div>
        </div>
      </div>

    </aside>
  </main>

</div>

<!-- ===== 工作详情 Modal ===== -->
<div id="detailModal" class="fixed inset-0 z-50 hidden">
  <div class="modal-overlay absolute inset-0" onclick="closeDetailModal()"></div>
  <div class="absolute inset-4 md:inset-10 lg:inset-20 glass rounded-2xl overflow-hidden flex flex-col animate-in">
    <div class="flex items-center justify-between p-5 border-b border-white/5">
      <div class="flex items-center gap-3">
        <div class="w-10 h-10 rounded-lg bg-gradient-to-br from-indigo-500/20 to-purple-500/20 flex items-center justify-center" id="modalIcon">
          <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/></svg>
        </div>
        <div>
          <h2 class="text-lg font-bold text-white" id="modalTitle">工作名称</h2>
          <p class="text-xs text-slate-400" id="modalSubtitle">所属阶段 / 子类别</p>
        </div>
      </div>
      <button onclick="closeDetailModal()" class="w-8 h-8 rounded-lg bg-white/5 hover:bg-white/10 flex items-center justify-center transition-colors">
        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="flex-1 overflow-y-auto p-6" id="modalBody">
      <!-- JS 渲染 -->
    </div>
    <div class="p-5 border-t border-white/5 flex justify-end gap-3">

/** 生成模拟文件的 Data URL */
function generateMockFile(filename, content) {
  const mimeMap = {
    '.py': 'text/x-python',
    '.js': 'application/javascript',
    '.json': 'application/json',
    '.yaml': 'text/yaml',
    '.yml': 'text/yaml',
    '.sh': 'application/x-sh',
    '.md': 'text/markdown',
    '.ts': 'application/typescript'
  };
  const ext = '.' + filename.split('.').pop();
  const mime = mimeMap[ext] || 'text/plain';
  // 使用 base64 编码内容
  const encoded = btoa(unescape(encodeURIComponent(content)));
  return `data:${mime};base64,${encoded}`;
}

// 从 localStorage 加载
function loadSkills() {
  try {
    const saved = localStorage.getItem('workflow_skills');
    if (saved) {
      uploadedSkills = JSON.parse(saved);
    } else {
      // localStorage 为空时，加载模拟 Skill 数据（带真实可下载文件）
      uploadedSkills = MOCK_SKILLS_DATA.map(s => ({ ...s }));
      saveSkills();
      console.log('[Skill Hub] 已加载 ' + uploadedSkills.length + ' 个模拟 Skill（可下载）');
    }
  } catch(e) {
    // 解析失败时也用模拟数据兜底
    uploadedSkills = MOCK_SKILLS_DATA.map(s => ({ ...s }));
  }
}
function saveSkills() {
  localStorage.setItem('workflow_skills', JSON.stringify(uploadedSkills));
}

// 统计某阶段的工项数
function countWorksInPhase(phaseId) {
  const phase = WORKFLOW_DATA.find(p => p.phaseId === phaseId);
  if (!phase) return 0;
  return phase.subCategories.reduce((sum, sc) => sum + sc.works.length, 0);
}

  currentPhase = phaseId;
  renderPhaseTabs();
  renderWorks(phaseId);
}

}

// 业务类型 tag 类
function getBizTypeClass(type) {
  if (type === '通用') return 'tag-general';
  if (type === 'SDK流量') return 'tag-sdk';
  if (type === '接口流量') return 'tag-api';
  return 'tag-general';
}

// 工作类型 tag 类
function getWorkTypeClass(type) {
  const map = {
    '信息收集': 'type-info', '信息整理': 'type-info',
    '沟通触达': 'type-comm', '方案制定': 'type-plan',
    '需求产出': 'type-demand', '配置管理': 'type-config',
    '数据分析': 'type-data', '决策判断': 'type-decision'
  };
  return map[type] || 'type-info';
}

// 检查工作是否有 Skill
function checkWorkHasSkill(workId) {
  return uploadedSkills.some(s => s.workId === workId);
}

// 获取工作的所有 Skills
function getWorkSkills(workId) {
  return uploadedSkills.filter(s => s.workId === workId);
}

// 渲染阶段概览
function renderPhaseOverview() {
  const phase = WORKFLOW_DATA.find(p => p.phaseId === currentPhase);
  if (!phase) return;

  const total = countWorksInPhase(currentPhase);
  const withSkill = phase.subCategories.reduce((sum, sc) => {
    return sum + sc.works.filter(w => checkWorkHasSkill(w.id)).length;
  }, 0);

  const container = document.getElementById('phaseOverview');
  container.innerHTML = phase.subCategories.map(sc => {
    const totalInCat = sc.works.length;
    const withSkillInCat = sc.works.filter(w => checkWorkHasSkill(w.id)).length;
    const pct = totalInCat > 0 ? Math.round(withSkillInCat / totalInCat * 100) : 0;
    return `
    <div>
      <div class="flex items-center justify-between text-sm mb-1">
        <span class="text-slate-300">${sc.name}</span>
        <span class="text-slate-500">${withSkillInCat}/${totalInCat}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;

}

// 更新统计
function updateStats() {
  let totalWorks = 0;
  let withSkillWorks = new Set();
  WORKFLOW_DATA.forEach(p => p.subCategories.forEach(sc => {
    totalWorks += sc.works.length;
    sc.works.forEach(w => {
      if (checkWorkHasSkill(w.id)) withSkillWorks.add(w.id);
    });
  }));

  document.getElementById('totalWorks').textContent = totalWorks;
  document.getElementById('skillCount').textContent = uploadedSkills.length;
  const rate = totalWorks > 0 ? Math.round(withSkillWorks.size / totalWorks * 100) : 0;
  document.getElementById('coverageRate').textContent = rate + '%';
  document.getElementById('coverageBar').style.width = rate + '%';

  // 更新右侧 Skill 列表
  renderUploadedSkillsList();
}

// ============================================================
// 文件处理
// ============================================================
function handleFileSelect(event) {
  handleFiles(event.target.files);
}

function handleFiles(files) {
  for (const file of files) {
    const reader = new FileReader();
    reader.onload = (e) => {
      selectedFiles.push({ name: file.name, size: file.size, type: file.type, data: e.target.result });
      renderSelectedFiles();
    };
    reader.readAsDataURL(file);
  }
}

function renderSelectedFiles() {
  const container = document.getElementById('selectedFiles');
  if (selectedFiles.length === 0) {
    container.classList.add('hidden');
    return;
  }
  container.classList.remove('hidden');
  container.innerHTML = selectedFiles.map((f, i) => `
    <div class="flex items-center gap-3 bg-white/[0.03] rounded-lg px-3 py-2 border border-white/5">
      <svg class="w-4 h-4 text-indigo-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
      <span class="text-sm text-slate-300 flex-1 truncate">${f.name}</span>
      <span class="text-xs text-slate-500">${formatSize(f.size)}</span>
      <button onclick="removeSelectedFile(${i})" class="text-slate-500 hover:text-red-400 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
  `).join('');
}

function removeSelectedFile(idx) {
  selectedFiles.splice(idx, 1);
  renderSelectedFiles();
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

// 提交上传
function submitUpload() {
  const name = document.getElementById('uploadSkillName').value.trim();
  const desc = document.getElementById('uploadSkillDesc').value.trim();
  const workId = document.getElementById('uploadWorkSelect').value;

  if (selectedFiles.length === 0) {
    showToast('请至少选择一个文件', 'error');
    return;
  }

  if (!name) {
    showToast('请输入 Skill 名称', 'error');
    return;
  }

  const skill = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,7),
    name,
    description: desc,
    workId: workId || '',
    files: selectedFiles.map(f => ({ name: f.name, size: f.size, data: f.data })),
    createdAt: new Date().toISOString()
  };

  uploadedSkills.push(skill);
  saveSkills();
  updateStats();
  renderWorks(currentPhase);
  renderPhaseOverview();

  closeGlobalUploadModal();
  showToast(`"${name}" 上传成功！${workId ? '已关联到工作项' : '作为独立 Skill 保存'}`, 'success');
}

// 删除 Skill
function deleteSkill(idx) {
  const skill = uploadedSkills[idx];
  if (!confirm(`确认删除 Skill "${skill.name}"？`)) return;
  uploadedSkills.splice(idx, 1);
  saveSkills();
  updateStats();
  renderWorks(currentPhase);
  renderPhaseOverview();
  showToast('已删除', 'success');
}

// ============================================================
// Skill 文件下载功能
// ============================================================
function downloadSkillFiles(skillId) {
  const skill = uploadedSkills.find(s => s.id === skillId);
  if (!skill || skill.files.length === 0) {
    showToast('该 Skill 没有可下载的文件', 'error');
    return;
  }

  if (skill.files.length === 1) {
    // 单文件直接下载
    downloadSingleFile(skill.files[0]);
  } else {
    // 多文件逐个下载（间隔触发）
    skill.files.forEach((f, i) => {
      setTimeout(() => downloadSingleFile(f), i * 300);
    });
  showToast(`正在下载 ${skill.files.length} 个文件...`, 'success');
  }
}

function downloadSingleFile(fileObj) {
  const a = document.createElement('a');
  a.href = fileObj.data;
  a.download = fileObj.name;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

  { name: '陈雨萱', avatar: 'CY', avatarBg: 'linear-gradient(135deg,#ec4899,#f472b6)', skills: 6, contributions: 18, color: '#ec4899' },
  { name: '刘子墨', avatar: 'LZ', avatarBg: 'linear-gradient(135deg,#14b8a6,#2dd4bf)', skills: 5, contributions: 14, color: '#14b8a6' },
];

const maxCalls = Math.max(...MOCK_CALL_RANKING.map(r => r.calls));
const maxContributions = Math.max(...MOCK_CONTRIBUTORS.map(c => c.contributions));

// ============================================================
// 渲染调用量排行榜
// ============================================================
function renderCallRanking() {
  const container = document.getElementById('callRankingList');
  container.innerHTML = MOCK_CALL_RANKING.map((item, idx) => {
    const pct = (item.calls / maxCalls * 100).toFixed(0);
    const rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : 'rank-n';
    return `
    <div class="flex items-center gap-2.5 group">
      <div class="rank-badge ${rankClass}">${idx + 1}</div>
      <div class="flex-1 min-w-0">
        <div class="text-xs text-slate-200 font-medium truncate group-hover:text-white transition-colors cursor-default" title="${item.name}">${item.name}</div>
        <div class="rank-bar mt-1"><div class="rank-bar-fill" style="width:${pct}%;background:${item.color}"></div></div>
      </div>
      <div class="text-right shrink-0">
        <div class="text-xs font-bold text-white">${item.calls.toLocaleString()}</div>
        <div class="text-[10px] font-medium" style="color:${item.color}">${item.trend}</div>
      </div>
    </div>`;
  }).join('');
}

// ============================================================
// 渲染贡献者排行榜
// ============================================================
function renderContributorRanking() {
  const container = document.getElementById('contributorRankingList');
  container.innerHTML = MOCK_CONTRIBUTORS.map((c, idx) => {
    const pct = (c.contributions / maxContributions * 100).toFixed(0);
    const rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : 'rank-n';
    return `
    <div class="flex items-center gap-2.5 group">
      <div class="rank-badge ${rankClass}">${idx + 1}</div>
      <div class="contributor-avatar" style="background:${c.avatarBg}">${c.avatar}</div>
      <div class="flex-1 min-w-0">
        <div class="text-xs text-slate-200 font-medium truncate">${c.name}</div>
        <div class="rank-bar mt-1"><div class="rank-bar-fill" style="width:${pct}%;background:${c.color}"></div></div>
      </div>
      <div class="text-right shrink-0">
        <div class="text-xs font-bold text-white">${c.skills} Skill</div>
        <div class="text-[10px] text-slate-500">${c.contributions} 贡献</div>
      </div>
    </div>`;
  }).join('');
}
</script>

</body>
</html>
